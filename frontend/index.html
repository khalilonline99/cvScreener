<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        input,
        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
        }

        #output {
            margin-top: 20px;
            text-align: left;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

        #loading {
            font-size: 16px;
            color: blue;
            display: none;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #111;
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h2>Upload Resume</h2>
    <div class="container">
        <input type="file" id="fileInput">
        <button onclick="uploadCV()">Upload</button>

        <pre id="result"></pre>
    </div>

    <script>
        async function uploadCV() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Select a file first");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            try {
                console.log('working before hitting the post method');

                const res = await fetch("http://localhost:5000/api/upload", {
                    method: "POST",
                    body: formData,
                });

                const data = await res.json();
                // console.log(data);

                document.getElementById("result").innerText =
                    JSON.stringify(data.data);

            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>

</html>
