<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-top: 2rem;
        }

        input,
        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
        }

        #output {
            margin-top: 20px;
            text-align: left;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

        #loading {
            font-size: 16px;
            color: blue;
            display: none;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #111;
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h2>Upload Resume</h2>

    <div class="container">
        <input type="file" id="fileInput" multiple>
        <!-- <button onclick="uploadCV()">Upload</button> -->
        <button onclick="uploadFiles()">Upload</button>

        <div id="status"></div>
        <pre id="result"></pre>
    </div>

    <div class="container">
        <button onclick="goToList()">View All CVs</button>
    </div>

    <script>

        async function uploadFiles() {
            const files = document.getElementById("fileInput").files;

            const formData = new FormData();

            for (let file of files) {
                formData.append("files", file);
            }

            const res = await fetch("http://localhost:5000/api/upload", {
                method: "POST",
                body: formData,
            });

            const { jobIds } = await res.json();

            showJobs(jobIds, files);
        }

        function showJobs(jobIds, files) {
            const container = document.getElementById("status");

            container.innerHTML = "";

            jobIds.forEach((id, index) => {
                const div = document.createElement("div");
                div.id = id;
                div.innerText = `${files[index].name} → Processing...`;
                container.appendChild(div);

                trackJob(id);
            });
        }

        function trackJob(jobId) {
            const interval = setInterval(async () => {
                const res = await fetch(`http://localhost:5000/api/jobs/${jobId}`);
                const job = await res.json();

                const el = document.getElementById(jobId);

                if (job.status === "done") {
                    el.innerText = `${job.fileName} → ✅ Uploaded`;
                    clearInterval(interval);
                    checkAllComplete();
                }

                if (job.status === "failed") {
                    el.innerHTML = `
                        ${job.fileName} → ❌ Failed 
                        <button onclick="retryJob('${jobId}')">Retry</button>
                    `;
                    clearInterval(interval);
                    checkAllComplete();
                }

            }, 2000);
        }

        let allDoneShown = false;

        function checkAllComplete() {
            if (allDoneShown) return;

            const all = document.querySelectorAll("#status div");

            const done = [...all].every(el =>
                el.innerText.includes("Uploaded") || el.innerText.includes("Failed")
            );

            if (done) {
                allDoneShown = true;
                alert("🎉 All files processed!");
            }
        }

        function goToList() {
            window.location.href = "cv-list.html";
        }

        async function retryJob(jobId) {
            const el = document.getElementById(jobId);

            el.innerText = "Retrying... ⏳";

            await fetch(`http://localhost:5000/api/jobs/${jobId}/retry`, {
                method: "POST"
            });

            trackJob(jobId); // start tracking again
        }

    </script>
